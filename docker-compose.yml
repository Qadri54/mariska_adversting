name: mariska_adversting

services:

  # ── PHP-FPM (source code bind-mounted dari host) ─────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
      - storage_app:/var/www/html/storage/app
      - logs:/var/www/html/storage/logs
      - ./docker/php-fpm/zzz-custom.conf:/usr/local/etc/php-fpm.d/zzz-custom.conf:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - mariska_net

  # ── Nginx internal (tidak expose port ke host) ────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_app:/app-storage:ro
      - ./public/images:/var/www/html/public/images:ro
      - ./public/products:/var/www/html/public/products:ro
    depends_on:
      - app
    networks:
      - mariska_net

  # ── MySQL 8 ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-aryaadvertising}
      MYSQL_USER: ${DB_USERNAME:-mariska_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mariska_net

volumes:
  mysql_data:
  vendor:
  storage_app:
  logs:

networks:
  mariska_net:
    driver: bridge
